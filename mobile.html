<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Planning APC">
<meta name="theme-color" content="#185FA5">
<title>Planning APC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --blue: #185FA5; --blue-dark: #0C447C; --blue-light: #E6F1FB;
    --mauve-light: #EEEDFE; --mauve-dark: #534AB7;
    --bg: #f0f0ee; --card: #ffffff; --text: #1a1a1a; --text2: #666; --text3: #999;
    --border: 0.5px solid #d0d0d0; --radius: 10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #loading { text-align:center; padding:80px 20px; color:var(--text2); font-size:14px; }

  .header { background: var(--blue); color: #fff; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.2); display:none; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-left:6px; }
  .sync-dot.err { background: #f87171; }
  .sync-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .day-nav { display: flex; align-items: center; gap: 8px; margin-bottom:10px; }
  .day-nav-btn { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 8px; padding: 6px 14px; font-size: 20px; cursor: pointer; line-height:1; }
  .day-nav-btn:active { background: rgba(255,255,255,.35); }
  .day-info { flex: 1; text-align: center; }
  .day-info .day-name { font-size: 16px; font-weight: 700; }
  .day-info .day-date { font-size: 12px; opacity: .85; margin-top: 1px; }
  .today-btn { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .today-btn:active { background: rgba(255,255,255,.35); }
  .week-strip { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .week-strip::-webkit-scrollbar { display: none; }
  .week-day { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 5px 7px; border-radius: 8px; cursor: pointer; min-width: 38px; }
  .week-day .wd-name { font-size: 10px; opacity: .75; font-weight: 500; }
  .week-day .wd-num { font-size: 14px; font-weight: 700; }
  .week-day.active { background: rgba(255,255,255,.25); }
  .week-day.we { opacity: .4; }
  .week-day.ferie { opacity: .55; }
  .week-day .dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; }
  .week-day .dot-empty { width: 5px; height: 5px; }

  .content { padding: 12px; display:none; }

  .ferie-banner { background: var(--mauve-light); color: var(--mauve-dark); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px; font-size: 13px; font-weight: 600; text-align: center; }
  .empty-day { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  .tech-card { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .tech-header { padding: 10px 14px; border-bottom: var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tech-name { font-size: 14px; font-weight: 700; }
  .tech-hours { font-size: 11px; font-weight: 600; color: var(--text2); background: #f0f0ee; padding: 2px 8px; border-radius: 10px; }

  .slot-row { display: flex; align-items: stretch; border-bottom: var(--border); }
  .slot-row:last-child { border-bottom: none; }
  .slot-time { width: 72px; flex-shrink: 0; font-size: 10px; font-weight: 600; color: var(--text3); padding: 10px 6px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.3; border-right: var(--border); background: #fafafa; }
  .slot-content { flex: 1; padding: 6px 10px; min-height: 52px; display: flex; flex-direction: column; justify-content: center; }
  .slot-empty { color: var(--text3); font-size: 12px; font-style: italic; }

  .ch-mobile { border-radius: 8px; padding: 8px 10px; margin: 2px 0; }
  .ch-updated-mobile { display:inline-block; background:#EAC100; color:#7a5c00; font-size:9px; font-weight:700; padding:2px 7px; border-radius:8px; margin-bottom:4px; }
  .ch-mobile-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
  .ch-mobile-aff { font-size: 11px; opacity: .85; margin-top: 2px; }
  .ch-mobile-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; opacity: .8; }
  .ch-mobile-note { font-size: 12px; margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,.3); line-height: 1.4; }

  .fullday-block { border-radius: 8px; padding: 10px 12px; margin: 8px 10px; position: relative; }
  .fullday-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; opacity: .75; }
  .fullday-name { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .fullday-aff { font-size: 11px; opacity: .85; margin-top: 2px; }
  .fullday-note { font-size: 12px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,.3); line-height: 1.4; }
  .fullday-hours { position: absolute; top: 8px; right: 10px; font-size: 11px; font-weight: 700; opacity: .75; background: rgba(0,0,0,.12); border-radius: 5px; padding: 2px 7px; }

  .legend { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .legend-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="loading">Connexion à Firebase...</div>

<div class="header" id="header">
  <div class="header-top">
    <h1>Planning APC <span class="sync-dot" id="sync-dot"></span></h1>
    <button class="today-btn" id="btn-today">Aujourd'hui</button>
  </div>
  <div class="day-nav">
    <button class="day-nav-btn" id="btn-prev">&#8249;</button>
    <div class="day-info">
      <div class="day-name" id="day-name"></div>
      <div class="day-date" id="day-date"></div>
    </div>
    <button class="day-nav-btn" id="btn-next">&#8250;</button>
  </div>
  <div class="week-strip" id="week-strip"></div>
</div>

<div class="content" id="content"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGE_SJBR7K04g1s8SO6MFsFvu13B34RYw",
  authDomain: "apc-planning.firebaseapp.com",
  databaseURL: "https://apc-planning-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apc-planning",
  storageBucket: "apc-planning.firebasestorage.app",
  messagingSenderId: "319467196433",
  appId: "1:319467196433:web:4562f95557aea6eae7a1b0"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const dbRef = ref(db, 'planning');

/* ── CONSTANTES ── */
const STATUTS = {
  confirmed:  {label:'RV confirmé',         bg:'#1B3A6B', tx:'#fff'},
  unconfirmed:{label:'RV non confirmé',      bg:'#1D9E75', tx:'#fff'},
  toconfirm:  {label:'RV à confirmer',       bg:'#888780', tx:'#fff'},
  empty:      {label:'Vide à remplir',       bg:'#E24B4A', tx:'#fff'},
  holiday:    {label:'Congés',               bg:'#EAC100', tx:'#7a5c00'},
  unavailable:{label:'Autre indisponibilité',bg:'#6B3A1B', tx:'#fff'},
};
const SLOT_LABELS  = ['8h-10h','10h-12h','13h30-15h30','15h30-17h30'];
const DAY_FULL     = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAY_SHORT    = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

/* ── ÉTAT ── */
let state = {chantiers:{}, resources:{}, affaires:{}};
let currentDate = ''; // initialisé après les helpers

/* ── HELPERS ── */
function fmtD(d){return d.toISOString().slice(0,10);}
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getStatut(id){return STATUTS[id]||STATUTS.confirmed;}
function chantierHours(c){if(!c.fullday)return 2;const s=c.slots&&c.slots.length?c.slots:[0,1,2,3];return s.length*2;}

// Navigation basée sur les strings YYYY-MM-DD pour éviter tout problème timezone
// Navigation 100% arithmétique sur YYYY-MM-DD, zéro objet Date
function dsToParts(ds){return[parseInt(ds.slice(0,4)),parseInt(ds.slice(5,7))-1,parseInt(ds.slice(8,10))];}
function dsGetDate(ds){return parseInt(ds.slice(8,10));}
function dsAddDays(ds,n){
  const [y,m,d]=dsToParts(ds);
  const dt=new Date(y,m,d); // minuit LOCAL — pas de string, pas de T12:00:00
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function dsDayOfWeek(ds){const[y,m,d]=dsToParts(ds);return new Date(y,m,d).getDay();}
function dsWeekStart(ds){const dy=dsDayOfWeek(ds);return dsAddDays(ds,-(dy===0?6:dy-1));}
function todayDs(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

/* ── JOURS FÉRIÉS ── */
function easterSunday(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
        l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
        month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(y,month-1,day);
}
const feriesCache={};
function getFeries(y){
  const E=easterSunday(y);
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  return {
    [localDateStr(new Date(y,0,1))]:"Jour de l'An",
    [localDateStr(add(E,1))]:"Lundi de Pâques",
    [localDateStr(new Date(y,4,1))]:"Fête du Travail",
    [localDateStr(new Date(y,4,8))]:"Victoire 1945",
    [localDateStr(add(E,39))]:"Ascension",
    [localDateStr(add(E,50))]:"Lundi de Pentecôte",
    [localDateStr(new Date(y,6,14))]:"Fête Nationale",
    [localDateStr(new Date(y,7,15))]:"Assomption",
    [localDateStr(new Date(y,10,1))]:"Toussaint",
    [localDateStr(new Date(y,10,11))]:"Armistice",
    [localDateStr(new Date(y,11,25))]:"Noël",
  };
}
function getFerie(ds){
  const y=parseInt(ds.slice(0,4));
  if(!feriesCache[y])feriesCache[y]=getFeries(y);
  return feriesCache[y][ds]||null;
}

/* ── BADGE MODIFIÉ ── */
function updatedBadge(c){
  if(!c.updatedAt)return '';
  const diff=Date.now()-c.updatedAt;
  if(diff>86400000)return '';
  const mins=Math.floor(diff/60000);
  const hours=Math.floor(diff/3600000);
  const label=mins<60?`il y a ${mins}mn`:`il y a ${hours}h`;
  const who=c.updatedBy?` · ${c.updatedBy}`:'';
  return `<div class="ch-updated-mobile">Modifié ${label}${who}</div>`;
}

/* ── SYNC DOT ── */
function setSynced(s){
  const dot=document.getElementById('sync-dot');
  if(!dot)return;
  dot.className='sync-dot'+(s==='err'?' err':s==='loading'?' loading':'');
}

/* ── RENDER ── */
function render(){
  const ds = currentDate;
  const today = todayDs();
  const ferieName = getFerie(ds);
  const isWE = dsDayOfWeek(currentDate)===0 || dsDayOfWeek(currentDate)===6;

  // Header
  document.getElementById('day-name').textContent = DAY_FULL[dsDayOfWeek(currentDate)];
  const [_y,_m,_d]=currentDate.split('-').map(Number);
  document.getElementById('day-date').textContent = new Date(_y,_m-1,_d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});

  // Week strip
  const weekStart = dsWeekStart(currentDate);
  let wh = '';
  for(let i=0;i<7;i++){
    const dds = dsAddDays(weekStart,i);
    const isA = dds===ds;
    const isWe = dsDayOfWeek(dds)===0||dsDayOfWeek(dds)===6;
    const isFer = !!getFerie(dds)&&!isWe;
    const hasEv = Object.values(state.chantiers).some(c=>c.date===dds);
    wh += `<div class="week-day${isA?' active':''}${isWe?' we':''}${isFer?' ferie':''}" data-ds="${dds}">
      <span class="wd-name">${DAY_SHORT[dsDayOfWeek(dds)]}</span>
      <span class="wd-num">${dsGetDate(dds)}</span>
      <span class="${hasEv?'dot':'dot-empty'}"></span>
    </div>`;
  }
  document.getElementById('week-strip').innerHTML = wh;
  document.querySelectorAll('.week-day').forEach(el=>{
    el.addEventListener('click',()=>{
      currentDate=el.dataset.ds;
      render();
    });
  });

  // Contenu
  const resources = Object.entries(state.resources);
  const firebaseDs = dsAddDays(ds,-1); // dates stockées J-1 dans Firebase
  const allItems = Object.values(state.chantiers).filter(c=>c.date===firebaseDs);
  let h = '';

  if(ferieName && !isWE){
    h += `<div class="ferie-banner">🎉 ${esc(ferieName)}</div>`;
  }
  if(isWE){
    h += `<div class="empty-day">Week-end 🎉</div>`;
  } else if(!allItems.length){
    h += `<div class="empty-day">Aucun chantier planifié ce jour</div>`;
  } else {
    let hasAnything = false;
    resources.forEach(([rid,techName])=>{
      const techItems = allItems.filter(c=>c.tech===rid);
      if(!techItems.length)return; // technicien libre ce jour
      hasAnything = true;
      const fdItem = techItems.find(c=>c.fullday);
      const totalH = techItems.reduce((s,c)=>s+chantierHours(c),0);

      h += `<div class="tech-card">
        <div class="tech-header">
          <span class="tech-name">${esc(techName)}</span>
          <span class="tech-hours">${totalH}h</span>
        </div>`;

      if(fdItem){
        const st = getStatut(fdItem.statut);
        const aff = fdItem.affId&&state.affaires[fdItem.affId]?state.affaires[fdItem.affId]:null;
        const fdSlots = fdItem.slots&&fdItem.slots.length?fdItem.slots:[0,1,2,3];
        h += `<div class="fullday-block" style="background:${st.bg};color:${st.tx}">
          ${updatedBadge(fdItem)}
          <div class="fullday-label">Journée</div>
          <div class="fullday-name">${esc(fdItem.client)}</div>
          ${aff?`<div class="fullday-aff">${esc(aff.name)}</div>`:''}
          ${fdItem.note?`<div class="fullday-note">${esc(fdItem.note)}</div>`:''}
          <span class="fullday-hours">${fdSlots.length*2}h</span>
        </div>`;
        // Créneaux normaux hors journée entière
        techItems.filter(c=>!c.fullday).forEach(c=>{
          const st2=getStatut(c.statut);
          const aff2=c.affId&&state.affaires[c.affId]?state.affaires[c.affId]:null;
          h+=`<div class="slot-row">
            <div class="slot-time">${SLOT_LABELS[c.slot||0]}</div>
            <div class="slot-content"><div class="ch-mobile" style="background:${st2.bg};color:${st2.tx}">
              ${updatedBadge(c)}
              <div class="ch-mobile-name">${esc(c.client)}</div>
              ${aff2?`<div class="ch-mobile-aff">${esc(aff2.name)}</div>`:''}
              ${c.note?`<div class="ch-mobile-note">${esc(c.note)}</div>`:''}
              <div class="ch-mobile-status">${st2.label}</div>
            </div></div>
          </div>`;
        });
      } else {
        for(let s=0;s<4;s++){
          const si = techItems.filter(c=>c.slot===s&&!c.fullday);
          h += `<div class="slot-row">
            <div class="slot-time">${SLOT_LABELS[s]}</div>
            <div class="slot-content">`;
          if(!si.length){
            h += `<span class="slot-empty">Libre</span>`;
          } else {
            si.forEach(c=>{
              const st=getStatut(c.statut);
              const aff=c.affId&&state.affaires[c.affId]?state.affaires[c.affId]:null;
              h+=`<div class="ch-mobile" style="background:${st.bg};color:${st.tx}">
                ${updatedBadge(c)}
                <div class="ch-mobile-name">${esc(c.client)}</div>
                ${aff?`<div class="ch-mobile-aff">${esc(aff.name)}</div>`:''}
                ${c.note?`<div class="ch-mobile-note">${esc(c.note)}</div>`:''}
                <div class="ch-mobile-status">${st.label}</div>
              </div>`;
            });
          }
          h += `</div></div>`;
        }
      }
      h += `</div>`;
    });
    if(!hasAnything){
      h += `<div class="empty-day">Aucun chantier planifié ce jour</div>`;
    }
  }

  // Légende statuts
  h += `<div class="legend">
    <div class="legend-title">Statuts</div>
    <div class="legend-grid">
      ${Object.values(STATUTS).map(s=>`<div class="legend-item"><span class="legend-dot" style="background:${s.bg}"></span>${s.label}</div>`).join('')}
    </div>
  </div>`;

  document.getElementById('content').innerHTML = h;
}

/* ── BOUTONS (attachés aux éléments HTML fixes, pas innerHTML) ── */
document.getElementById('btn-prev').addEventListener('click',()=>{
  currentDate=dsAddDays(currentDate,-1); render();
});
document.getElementById('btn-next').addEventListener('click',()=>{
  currentDate=dsAddDays(currentDate,1); render();
});
document.getElementById('btn-today').addEventListener('click',()=>{
  currentDate=todayDs(); render();
});

/* ── FIREBASE ── */
currentDate = todayDs(); // initialisation ici après que todayDs soit définie
onValue(dbRef,(snapshot)=>{
  const data=snapshot.val();
  if(data)state={chantiers:{},resources:{},affaires:{},...data};
  document.getElementById('loading').style.display='none';
  document.getElementById('header').style.display='block';
  document.getElementById('content').style.display='block';
  render();
  setSynced('ok');
});
</script>
</body>
</html>
